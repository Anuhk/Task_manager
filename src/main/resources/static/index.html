<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #74ebd5, #9face6);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .input-group {
            display: flex;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px 0 0 8px;
            border: none;
            outline: none;
        }

        #addBtn {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 0 8px 8px 0;
            cursor: pointer;
            transition: 0.3s;
        }

        #addBtn:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        li:hover {
            transform: scale(1.02);
        }

        .task-text {
            flex: 1;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .btn {
            margin-left: 5px;
            border: none;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .done {
            background: #2196F3;
            color: white;
        }

        .delete {
            background: #f44336;
            color: white;
        }

        .done:hover {
            background: #1976D2;
        }

        .delete:hover {
            background: #d32f2f;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>✨ Task Manager</h2>

    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Enter task">
        <button id="addBtn" onclick="addTask()">Add</button>
    </div>

    <ul id="taskList"></ul>
</div>

<script>
function loadTasks() {
    fetch('/tasks')
        .then(res => res.json())
        .then(data => {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            data.forEach(task => {
                let li = document.createElement('li');

                let text = document.createElement('span');
                text.className = "task-text";
                text.innerText = task.title;

                if (task.completed) {
                    text.classList.add("completed");
                }

                let doneBtn = document.createElement('button');
                doneBtn.innerText = "✔";
                doneBtn.className = "btn done";
                doneBtn.onclick = () => completeTask(task.id);

                let delBtn = document.createElement('button');
                delBtn.innerText = "✖";
                delBtn.className = "btn delete";
                delBtn.onclick = () => deleteTask(task.id);

                li.appendChild(text);
                li.appendChild(doneBtn);
                li.appendChild(delBtn);

                list.appendChild(li);
            });
        });
}

function addTask() {
    let title = document.getElementById('taskInput').value;
    fetch(`/tasks?title=${title}`, { method: 'POST' })
        .then(() => {
            document.getElementById('taskInput').value = "";
            loadTasks();
        });
}

function completeTask(id) {
    fetch(`/tasks/${id}`, { method: 'PUT' })
        .then(() => loadTasks());
}

function deleteTask(id) {
    fetch(`/tasks/${id}`, { method: 'DELETE' })
        .then(() => loadTasks());
}

loadTasks();
</script>

</body>
</html>
